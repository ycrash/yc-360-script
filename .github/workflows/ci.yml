name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false  # golangci-lint-action handles its own caching

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  resolve-go-version:
    name: Resolve Go version
    runs-on: ubuntu-latest
    outputs:
      go-version: ${{ steps.go-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract Go version from go.mod
        id: go-version
        run: echo "version=$(grep '^go ' go.mod | awk '{print $2}')" >> "$GITHUB_OUTPUT"

  build:
    name: Build (Alpine)
    needs: resolve-go-version
    runs-on: ubuntu-latest
    container:
      image: golang:${{ needs.resolve-go-version.outputs.go-version }}-alpine

    steps:
      - name: Install build dependencies
        run: apk add --no-cache gcc musl-dev ncurses-dev ncurses-static git

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build binary
        run: |
          cd cmd/yc
          go build -buildvcs=false -ldflags="-s -w" -o yc
          ./yc -version

  test:
    name: Test (Alpine)
    needs: resolve-go-version
    runs-on: ubuntu-latest
    container:
      image: golang:${{ needs.resolve-go-version.outputs.go-version }}-alpine

    steps:
      - name: Install build and test dependencies
        run: apk add --no-cache gcc musl-dev ncurses-dev ncurses-static git openjdk11

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Java environment
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/default-jvm" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/default-jvm/bin" >> "$GITHUB_PATH"

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests with coverage
        run: |
          go test -race -timeout 30m -buildvcs=false -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage summary
        run: |
          go tool cover -func=coverage.out | tail -20
          echo ""
          echo "=== Total Coverage ==="
          go tool cover -func=coverage.out | grep total


